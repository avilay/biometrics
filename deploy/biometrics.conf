server {
    server_name biometrics.avilay.rocks;
    location /__/auth {
        proxy_pass https://avilabs-271703.firebaseapp.com;
        proxy_set_header Host avilabs-271703.firebaseapp.com;
        proxy_ssl_server_name on;
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:8000;
    }
    gzip off;
    listen 443 ssl;
    ssl_certificate /etc/cloudflare/cert.pem;
    ssl_certificate_key /etc/cloudflare/privkey.pem;
}
